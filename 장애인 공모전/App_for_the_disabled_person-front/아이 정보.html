<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이 정보 - 브레인코드</title>
    <link rel="icon" href="img/뇌-파랑.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --blue-dark:    #4A7EC7;
            --blue-mid:     #6B9FD4;
            --blue-light:   #A8C8E8;
            --blue-pale:    #D6E8F7;
            --blue-softest: #EEF5FC;
            --white:        #FFFFFF;
            --text-dark:    #2B4A6F;
            --text-mid:     #4A6F96;
            --text-light:   #7A9DBF;
        }

        * { box-sizing: border-box; }

        body{
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--blue-softest);
            color: var(--text-dark);
        }

        .info-container {
            background-color: var(--white);
            padding: 30px;
            border-radius: 20px;    /* 모서리를 둥글게 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* 부드러운 그림자 */
            width: 90%;
            max-width: 400px;       /* 박스 최대 너비 */
            display: flex;
            flex-direction: column;
            gap: 15px;              /* 입력칸 사이 간격 */
        }

        .info-container h2 {
            font-family: 'Jua', sans-serif;
            color: var(--text-dark);
            margin: 0 0 10px 0;
            text-align: center;
        }

        /* 입력칸 스타일 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 14px;
            color: var(--text-mid);
            font-weight: 500;
        }

        .input-group input {
            padding: 12px;
            border: 1px solid var(--blue-light);
            border-radius: 10px;    /* 입력칸도 둥글게 */
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--blue-dark); /* 클릭 시 강조 색상 */
        }

        .main-content {
            display: flex;
            justify-content: center; /* 가로 중앙 */
            align-items: center;     /* 세로 중앙 */
            
            min-height: calc(100vh - 80px); /* 72px는 네비바의 대략적인 높이입니다 */
        }
    </style>

</head>
<body>
    <main class="main-content">
        <div class="info-container">
        <h2>정보 입력</h2>
        
        <div class="input-group">
            <label for="user-name">아이의 이름은?</label>
            <input type="text" id="user-name" placeholder="이름을 입력하세요">
        </div>

        <div class="input-group">
            <label for="birth-year">아이의 태어난 년도는?</label>
            <input type="number" id="birth-year" placeholder="예: 2015">
        </div>

        <div class="input-group">
            <label for="birth-date">아이가 태어난 월 일은?</label>
            <input type="text" id="birth-date" placeholder="예: 0520">
        </div>
    </main>

    <div class="avatar-list">
        <img src="강아지.png" class="avatar" />
        <img src="고양이.png" class="avatar" />
        <img src="우파루파.png" class="avatar" />
        <img src="라쿤.png" class="avatar" />
        <img src="곰.png" class="avatar" />
    </div>
</div>
</body>
</html>
