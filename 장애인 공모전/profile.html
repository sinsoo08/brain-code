<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 - 브레인 코드</title>
    <link rel="icon" href="img/뇌-파랑.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <!-- 페이지 내용 (예시) -->
    <div class="page-bg">
        <button class="open-btn" onclick="openModal()">⚙️ 설정</button>
    </div>

    <!-- 설정 모달 -->
    <div id="modal" class="modal" onclick="handleBackdrop(event)">
        <div class="modal-content">

            <!-- 헤더 -->
            <div class="modal-header">
                <span class="modal-title">설정</span>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>

            <!-- 탭 -->
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('game', this)">
                    <span class="tab-icon">🎮</span>
                    <span class="tab-label">게임</span>
                </button>
                <button class="tab-btn" onclick="switchTab('sound', this)">
                    <span class="tab-icon">🔊</span>
                    <span class="tab-label">소리</span>
                </button>
                <button class="tab-btn" onclick="switchTab('account', this)">
                    <span class="tab-icon">👤</span>
                    <span class="tab-label">계정</span>
                </button>
            </div>

            <!-- 탭 패널: 게임 -->
            <div id="tab-game" class="tab-panel active">
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">난이도</span>
                        <span class="setting-desc">문제의 어려움을 조절해요</span>
                    </div>
                    <div class="seg-control">
                        <button class="seg-btn active" onclick="selectSeg(this)">쉬움</button>
                        <button class="seg-btn" onclick="selectSeg(this)">보통</button>
                        <button class="seg-btn" onclick="selectSeg(this)">어려움</button>
                    </div>
                </div>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">힌트 보기</span>
                        <span class="setting-desc">문제 풀 때 힌트를 보여줘요</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" checked>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">타이머</span>
                        <span class="setting-desc">제한 시간을 표시해요</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    </label>
                </div>
            </div>

            <!-- 탭 패널: 소리 -->
            <div id="tab-sound" class="tab-panel">
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">효과음</span>
                        <span class="setting-desc">버튼 클릭·정답 효과음</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" checked>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">배경음악</span>
                        <span class="setting-desc">게임 중 배경음악을 틀어요</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" checked>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    </label>
                </div>
                <div class="setting-row column">
                    <div class="setting-info">
                        <span class="setting-label">전체 볼륨</span>
                        <span class="setting-desc">소리 크기를 조절해요</span>
                    </div>
                    <div class="slider-wrap">
                        <span class="slider-icon">🔈</span>
                        <input type="range" class="slider" min="0" max="100" value="70">
                        <span class="slider-icon">🔊</span>
                    </div>
                </div>
            </div>

            <!-- 탭 패널: 계정 -->
            <div id="tab-account" class="tab-panel">
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">이름</span>
                        <span class="setting-desc">프로필에 표시되는 이름</span>
                    </div>
                    <input type="text" class="inline-input" placeholder="이름 입력">
                </div>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">아바타 변경</span>
                        <span class="setting-desc">캐릭터를 다시 골라요</span>
                    </div>
                    <button class="link-btn" onclick="location.href='avatar.html'">변경 →</button>
                </div>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">기록 초기화</span>
                        <span class="setting-desc">모든 학습 기록을 지워요</span>
                    </div>
                    <button class="danger-btn">초기화</button>
                </div>
            </div>

            <!-- 푸터 -->
            <div class="modal-footer">
                <button class="save-btn" onclick="closeModal()">저장하기</button>
            </div>

        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
