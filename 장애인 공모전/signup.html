<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 브레인 코드</title>
    <link rel="icon" href="img/brain-blue.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="signup.css">
    <!--
    =====================================================================
    ★ 구글 소셜 로그인 키 발급 방법
    =====================================================================
    1. https://console.cloud.google.com 접속 → 새 프로젝트 생성
    2. 왼쪽 메뉴 → "API 및 서비스" → "OAuth 동의 화면" 설정
       - User Type: 외부 선택 → 앱 이름, 이메일 입력
    3. "사용자 인증 정보" → "사용자 인증 정보 만들기" → "OAuth 2.0 클라이언트 ID"
       - 애플리케이션 유형: 웹 애플리케이션
       - 승인된 JavaScript 원본: http://localhost (또는 실제 도메인)
    4. 생성된 "클라이언트 ID" 복사
    5. 아래 GOOGLE_CLIENT_ID 변수에 붙여넣기
    =====================================================================

    ★ 카카오 소셜 로그인 키 발급 방법
    =====================================================================
    1. https://developers.kakao.com 접속 → 로그인 → 내 애플리케이션
    2. "애플리케이션 추가하기" → 앱 이름 입력 (예: 브레인코드)
    3. 생성된 앱 클릭 → 앱 키 탭 → "JavaScript 키" 복사
    4. 왼쪽 메뉴 → "카카오 로그인" → 활성화 ON
    5. "Redirect URI" 등록: http://localhost (또는 실제 도메인)
    6. 아래 KAKAO_JS_KEY 변수에 붙여넣기
    =====================================================================
    -->

    <!-- 구글 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- 카카오 SDK -->
    <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="main.html" class="nav-left">
            <img src="img/brain-blue.png" class="brain-logo" alt="로고">
            <span class="logo-text">브레인 코드</span>
        </a>
        <ul class="menu">
            <li><a href="main.html">홈</a></li>
            <li><a href="login.html">로그인</a></li>
        </ul>
    </nav>

    <div class="page-body">
        <div class="card">
            <div class="card-header">
                <div class="logo-wrap">
                    <img src="img/brain-blue.png" alt="로고">
                </div>
                <h1>회원가입</h1>
                <p>브레인 코드와 함께 시작해요 🚀</p>
            </div>

            <div class="divider">이메일로 가입</div>

            <div class="field">
                <label for="emailInput">이메일</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </span>
                    <input type="email" id="emailInput" placeholder="example@email.com" oninput="validateEmail()">
                </div>
                <div class="check-row" id="emailCheck">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                    올바른 이메일 형식으로 입력해주세요
                </div>
            </div>

            <div class="field">
                <label for="passwordInput">비밀번호</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="passwordInput" placeholder="비밀번호 (8자 이상)" oninput="checkStrength()">
                </div>
                <div class="strength-bar-wrap">
                    <div class="strength-seg" id="seg1"></div>
                    <div class="strength-seg" id="seg2"></div>
                    <div class="strength-seg" id="seg3"></div>
                    <div class="strength-seg" id="seg4"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="field">
                <label for="passwordConfirm">비밀번호 확인</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </span>
                    <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" oninput="checkMatch()">
                </div>
                <div class="check-row" id="matchCheck">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                    <span id="passwordCheckMsg"></span>
                </div>
            </div>

            <button class="submit-btn" onclick="signup()">이메일로 회원가입 →</button>

            <div class="divider">또는 간편 가입</div>

            <!-- ★ 소셜 간편 가입 -->
            <div class="social-row">
                <button class="social-btn google" onclick="signupWithGoogle()">
                    <svg width="17" height="17" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    구글로 시작하기
                </button>
                <button class="social-btn kakao" onclick="signupWithKakao()">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="#3C1E1E">
                        <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.697 5.077 4.267 6.495L5.2 21l4.523-2.872C10.44 18.37 11.21 18.5 12 18.5c5.523 0 10-3.477 10-7.7S17.523 3 12 3z"/>
                    </svg>
                    카카오로 시작하기
                </button>
            </div>

            <div class="login-link">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
        </div>
    </div>

    <div id="alert-box"></div>

    <!-- 구글 One Tap (data-client_id에 키 입력) -->
    <div id="g_id_onload"
        data-client_id="YOUR_GOOGLE_CLIENT_ID"
        data-callback="handleGoogleResponse"
        data-auto_prompt="false">
    </div>

    <script>
        /* =========================================================
           ★ 발급받은 키를 여기에 입력하세요
           ========================================================= */
        const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID"; // Google Cloud Console에서 발급
        const KAKAO_JS_KEY     = "YOUR_KAKAO_JS_KEY";     // Kakao Developers에서 발급

        /* 카카오 SDK 초기화 */
        if (typeof Kakao !== 'undefined' && KAKAO_JS_KEY !== "YOUR_KAKAO_JS_KEY") {
            Kakao.init(KAKAO_JS_KEY);
        }

        /* ── 알림 ── */
        function showAlert(message, type = 'error') {
            const box = document.getElementById("alert-box");
            box.textContent = message;
            box.className = type;
            box.classList.add('show');
            clearTimeout(box._timer);
            box._timer = setTimeout(() => { box.classList.remove('show'); }, 3500);
        }

        /* =========================================================
           ★ 구글 간편 회원가입
           ========================================================= */
        function signupWithGoogle() {
            if (GOOGLE_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID") {
                showAlert("Google Cloud Console에서 Client ID를 발급 후 코드에 입력해주세요!", "error");
                return;
            }
            const client = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: "email profile openid",
                callback: (tokenResponse) => {
                    if (tokenResponse.error) {
                        showAlert("구글 로그인 실패: " + tokenResponse.error, "error");
                        return;
                    }
                    fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
                        headers: { Authorization: "Bearer " + tokenResponse.access_token }
                    })
                    .then(r => r.json())
                    .then(user => {
                        /* ★ 실제 서비스에서는 여기서 서버 API로 회원가입 요청을 보내세요
                           예: fetch('/api/signup/google', { method:'POST', body: JSON.stringify(user) }) */
                        localStorage.setItem("isLoggedIn", "true");
                        localStorage.setItem("userEmail", user.email);
                        localStorage.setItem("userName",  user.name);
                        localStorage.setItem("loginType", "google");
                        showAlert("구글 회원가입 완료! 환영해요 😊", "success");
                        setTimeout(() => { window.location.href = "kid.html"; }, 1200);
                    })
                    .catch(() => showAlert("사용자 정보를 가져오지 못했어요.", "error"));
                }
            });
            client.requestAccessToken();
        }

        /* 구글 One Tap 콜백 */
        function handleGoogleResponse(response) {
            /* ★ response.credential = JWT ID Token
               실제 서비스에서는 서버로 보내 검증해야 합니다.
               예: fetch('/api/signup/google', { body: response.credential }) */
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("loginType",  "google");
            showAlert("구글 회원가입 완료! 환영해요 😊", "success");
            setTimeout(() => { window.location.href = "kid.html"; }, 1200);
        }

        /* =========================================================
           ★ 카카오 간편 회원가입
           ========================================================= */
        function signupWithKakao() {
            if (KAKAO_JS_KEY === "YOUR_KAKAO_JS_KEY") {
                showAlert("Kakao Developers에서 JS 키를 발급 후 코드에 입력해주세요!", "error");
                return;
            }
            if (typeof Kakao === 'undefined') {
                showAlert("카카오 SDK 로딩 실패. 인터넷 연결을 확인해주세요.", "error");
                return;
            }
            Kakao.Auth.login({
                success: function(authObj) {
                    Kakao.API.request({
                        url: "/v2/user/me",
                        success: function(res) {
                            const email = res.kakao_account?.email || "";
                            const name  = res.kakao_account?.profile?.nickname || "카카오 사용자";
                            /* ★ 실제 서비스에서는 서버로 회원가입 요청을 보내세요
                               예: fetch('/api/signup/kakao', { method:'POST', body: JSON.stringify({email, name}) }) */
                            localStorage.setItem("isLoggedIn", "true");
                            localStorage.setItem("userEmail", email);
                            localStorage.setItem("userName",  name);
                            localStorage.setItem("loginType", "kakao");
                            showAlert("카카오 회원가입 완료! 환영해요 😊", "success");
                            setTimeout(() => { window.location.href = "kid.html"; }, 1200);
                        },
                        fail: function(err) {
                            console.error(err);
                            showAlert("카카오 정보 조회 실패", "error");
                        }
                    });
                },
                fail: function(err) {
                    console.error(err);
                    showAlert("카카오 로그인이 취소되었거나 실패했어요.", "error");
                }
            });
        }

        /* ── 이메일 유효성 ── */
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        function validateEmail() {
            const val = document.getElementById("emailInput").value;
            document.getElementById("emailCheck").classList.toggle('ok', emailPattern.test(val));
        }

        /* ── 비밀번호 강도 ── */
        function checkStrength() {
            const pw = document.getElementById("passwordInput").value;
            let score = 0;
            if (pw.length >= 8)          score++;
            if (/[A-Z]/.test(pw))        score++;
            if (/[0-9]/.test(pw))        score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const colors = ['#D96B6B','#E8A84A','#5B8FCC','#4CA896'];
            const labels = ['약함','보통','강함','매우 강함'];
            ['seg1','seg2','seg3','seg4'].forEach((id, i) => {
                document.getElementById(id).style.background = i < score ? colors[score-1] : '';
            });
            const label = document.getElementById("strengthLabel");
            if (!pw.length) { label.textContent = ''; return; }
            label.textContent = '비밀번호 강도: ' + labels[score-1];
            label.style.color = colors[score-1];
            checkMatch();
        }

        /* ── 비밀번호 일치 ── */
        function checkMatch() {
            const pw   = document.getElementById("passwordInput").value;
            const conf = document.getElementById("passwordConfirm").value;
            document.getElementById("passwordCheckMsg").innerText = conf.length && pw === conf ? '비밀번호가 일치합니다.' : '비밀번호가 일치하지 않습니다.'
            document.getElementById("matchCheck").classList.toggle('ok', conf.length > 0 && pw === conf);
        }

        /* ── 이메일 회원가입 ── */
        function signup() {
            const email = document.getElementById("emailInput").value.trim();
            const pw    = document.getElementById("passwordInput").value;
            const conf  = document.getElementById("passwordConfirm").value;
            if (!email || !pw || !conf)    return showAlert("모든 항목을 입력해주세요!");
            if (!emailPattern.test(email)) return showAlert("올바른 이메일 형식을 입력해주세요!");
            if (pw.length < 8)             return showAlert("비밀번호는 8자 이상이어야 해요!");
            if (pw !== conf)               return showAlert("비밀번호가 일치하지 않아요!");
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("userEmail",  email);
            localStorage.setItem("loginType",  "email");
            showAlert("회원가입 완료! 환영해요 🎉", "success");
            setTimeout(() => { window.location.href = "kid.html"; }, 1200);
        }

        document.getElementById("passwordConfirm").addEventListener("keydown", e => {
            if (e.key === "Enter") signup();
        });
    </script>

</body>
</html>
