<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이 정보 - 브레인코드</title>
    <link rel="icon" href="img/brain-blue.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="kid.css">
</head>
<body>

    <div class="form-card">

        <div class="card-header">
            <h2>아이 정보 입력</h2>
            <p>입력한 정보로 맞춤 학습을 시작해요</p>
        </div>

        <div class="form-section">
            <div class="section-label">
                <div class="icon">📝</div>
                기본 정보
            </div>

            <div class="input-group">
                <label for="user-name">아이의 이름</label>
                <input type="text" id="user-name" placeholder="이름을 입력하세요">
            </div>

            <div class="input-group">
                <label for="birth-year">태어난 년도</label>
                <input type="number" id="birth-year" placeholder="예: 2000">
            </div>

            <div class="input-group">
                <label for="birth-date">태어난 월/일</label>
                <input type="text" id="birth-date" placeholder="예: 0520">
            </div>
        </div>

        <div class="form-section">
            <div class="section-label">
                <div class="icon">🐾</div>
                캐릭터 선택
            </div>
        </div>

        <div class="avatar-section">
            <div class="avatar-grid">
                <div class="avatar-item" data-src="img/dog.png">
                    <div class="avatar-img-wrap">
                        <img src="img/dog.png" alt="강아지" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                        <span class="avatar-emoji" style="display:none">🐶</span>
                    </div>
                    <span class="avatar-name">강아지</span>
                </div>
                <div class="avatar-item" data-src="img/cat.png">
                    <div class="avatar-img-wrap">
                        <img src="img/cat.png" alt="고양이" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                        <span class="avatar-emoji" style="display:none">🐱</span>
                    </div>
                    <span class="avatar-name">고양이</span>
                </div>
                <div class="avatar-item" data-src="img/axolotl.png">
                    <div class="avatar-img-wrap">
                        <img src="img/axolotl.png" alt="우파루파" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                        <span class="avatar-emoji" style="display:none">🦎</span>
                    </div>
                    <span class="avatar-name">우파루파</span>
                </div>
                <div class="avatar-item" data-src="img/raccoon.png">
                    <div class="avatar-img-wrap">
                        <img src="img/raccoon.png" alt="라쿤" onerror="handleOnError(this)">
                        <span class="avatar-emoji" style="display:none">🦝</span>
                    </div>
                    <span class="avatar-name">라쿤</span>
                </div>
                <div class="avatar-item" data-src="img/bear.png">
                    <div class="avatar-img-wrap">
                        <img src="img/bear.png" alt="곰" onerror="handleOnError(this)">
                        <span class="avatar-emoji" style="display:none">🐻</span>
                    </div>
                    <span class="avatar-name">곰</span>
                </div>
            </div>
        </div>

        <div class="form-footer">
            <button class="submit-btn" onclick="handleSubmit()">
                프로필 시작하기 →
            </button>
        </div>

    </div>

    <script>

        const handleOnError = (element) => {
            element.style.display = 'none';
            element.nextElementSibling.style.display = 'block';
        }

        let selectedAvatar = null;

        document.querySelectorAll('.avatar-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.avatar-item').forEach(a => a.classList.remove('selected'));
                item.classList.add('selected');
                selectedAvatar = item.dataset.src;
            });
        });

        function handleSubmit() {
            const name = document.getElementById('user-name').value.trim();
            const year = document.getElementById('birth-year').value.trim();
            const date = document.getElementById('birth-date').value.trim();

            if (!name) { alert('아이의 이름을 입력해 주세요.'); document.getElementById('user-name').focus(); return; }
            if (!year) { alert('태어난 년도를 입력해 주세요.'); document.getElementById('birth-year').focus(); return; }
            if (!date) { alert('태어난 월/일을 입력해 주세요.'); document.getElementById('birth-date').focus(); return; }
            if (!selectedAvatar) { alert('캐릭터를 선택해 주세요.'); return; }

            fetch('/save-avatar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, birthYear: year, birthDate: date, avatar: selectedAvatar })
            }).catch(() => {});

            location.href = 'profile.html';
        }
    </script>

</body>
</html>
