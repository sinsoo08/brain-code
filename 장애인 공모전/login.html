<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 브레인 코드</title>
    <link rel="icon" href="img/brain-blue.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <nav class="navbar">
        <a href="main.html" class="nav-left">
            <img src="img/brain-blue.png" class="brain-logo" alt="로고">
            <span class="logo-text">브레인 코드</span>
        </a>
        <ul class="menu">
            <li><a href="main.html">홈</a></li>
            <li><a href="signup.html">회원가입</a></li>
        </ul>
    </nav>

    <div class="page-body">
        <div class="card">
            <div class="card-header">
                <div class="logo-wrap">
                    <img src="img/brain-blue.png" alt="로고">
                </div>
                <h1>로그인</h1>
                <p>브레인 코드에 오신 것을 환영해요 👋</p>
            </div>

            <div class="field">
                <label for="emailInput">이메일</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </span>
                    <input type="email" id="emailInput" placeholder="example@email.com">
                </div>
            </div>

            <div class="field">
                <label for="passwordInput">비밀번호</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="passwordInput" placeholder="비밀번호를 입력하세요">
                </div>
            </div>

            <button class="login-btn" onclick="login()">로그인</button>

            <div class="divider">또는</div>

            <div class="social-row">
                <!-- Google -->
                <button class="social-btn google" onclick="loginWithGoogle()">
                    <svg width="17" height="17" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    구글 로그인
                </button>

                <!-- Kakao -->
                <button class="social-btn kakao" onclick="loginWithKakao()">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="#3C1E1E">
                        <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.697 5.077 4.267 6.495L5.2 21l4.523-2.872C10.44 18.37 11.21 18.5 12 18.5c5.523 0 10-3.477 10-7.7S17.523 3 12 3z"/>
                    </svg>
                    카카오 로그인
                </button>
            </div>

            <div class="signup-link">
                계정이 없으신가요? <a href="signup.html">회원가입</a>
            </div>
        </div>
    </div>

    <div id="alert-box"></div>

    <!-- Google OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <div id="g_id_onload"
        data-client_id="YOUR_CLIENT_ID"
        data-callback="handleCredentialResponse">
    </div>

    <!-- Kakao SDK -->
    <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

    <script>
        /* ── 알림 ── */
        function showAlert(message, type = 'error') {
            const box = document.getElementById("alert-box");
            box.textContent = message;
            box.className = type;
            box.classList.add('show');
            clearTimeout(box._timer);
            box._timer = setTimeout(() => { box.classList.remove('show'); }, 3000);
        }

        /* ── 이메일 로그인 ── */
        function login() {
            const email = document.getElementById("emailInput").value.trim();
            const pw    = document.getElementById("passwordInput").value;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !pw)            return showAlert("이메일과 비밀번호를 입력해주세요!");
            if (!emailPattern.test(email)) return showAlert("올바른 이메일 형식을 입력해주세요!");

            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("userEmail", email);
            showAlert("로그인 되었습니다!", "success");
            setTimeout(() => { window.location.href = "profile.html"; }, 1000);
        }

        /* ── 엔터키 지원 ── */
        document.getElementById("passwordInput").addEventListener("keydown", e => {
            if (e.key === "Enter") login();
        });

        /* ── 구글 로그인 ── */
        function handleCredentialResponse(response) {
            console.log("구글 토큰:", response.credential);
            showAlert("구글 로그인 성공!", "success");
        }

        function loginWithGoogle() {
            // Google One Tap 또는 Popup 방식 연동 필요
            showAlert("구글 로그인 준비 중입니다.", "error");
        }

        /* ── 카카오 로그인 ── */
        if (typeof Kakao !== 'undefined') {
            Kakao.init("YOUR_APP_KEY");
        }

        function loginWithKakao() {
            if (typeof Kakao === 'undefined') {
                return showAlert("카카오 SDK 로드 실패", "error");
            }
            Kakao.Auth.login({
                success: function(authObj) {
                    console.log("카카오 토큰:", authObj.access_token);
                    showAlert("카카오 로그인 성공!", "success");
                },
                fail: function(err) {
                    console.error(err);
                    showAlert("카카오 로그인 실패", "error");
                }
            });
        }
    </script>

</body>
</html>
