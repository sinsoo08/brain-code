<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>두뇌 놀이터</title>

<style>

body{
margin:0;
font-family:"Noto Sans KR",sans-serif;
text-align:center;
background:linear-gradient(135deg,#c2e9fb,#f9c4d2);
}

h1{
font-size:42px;
margin-top:30px;
}

#menu{
margin-top:40px;
}

.gameBtn{
display:block;
width:260px;
margin:15px auto;
padding:20px;
font-size:22px;
border:none;
border-radius:20px;
background:white;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
cursor:pointer;
}

#gameArea{
margin-top:30px;
}

.cardGrid{
display:grid;
grid-template-columns:repeat(3,110px);
gap:15px;
justify-content:center;
margin-top:30px;
}

.card{
width:110px;
height:110px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
border-radius:18px;
background:white;
cursor:pointer;
}

.colorCard{
width:110px;
height:110px;
border-radius:18px;
cursor:pointer;
}

#soundToggle{
position:fixed;
top:15px;
right:15px;
width:60px;
height:60px;
font-size:30px;
border:none;
border-radius:50%;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
cursor:pointer;
}

.backBtn{
margin-top:30px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:15px;
background:white;
cursor:pointer;
}

/* 애니메이션 */

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.spin{
animation:spin 2s linear infinite
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.bounce{
animation:bounce 1s infinite
}

@keyframes shake{
0%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
100%{transform:translateX(-5px)}
}

.shake{
animation:shake 0.5s infinite
}

</style>
</head>


<body>

<button id="soundToggle">🔇</button>

<h1>🧠 두뇌 놀이터</h1>

<div id="menu">

<button class="gameBtn" onclick="startMotionGame()">🎮 움직임 찾기</button>
<button class="gameBtn" onclick="startColorGame()">🎨 색깔 찾기</button>
<button class="gameBtn" onclick="startMemoryGame()">🧠 카드 짝 맞추기</button>

</div>

<div id="gameArea"></div>

<script>

let soundOn=false
const gameArea=document.getElementById("gameArea")

document.getElementById("soundToggle").onclick=()=>{
soundOn=!soundOn
document.getElementById("soundToggle").textContent=soundOn?"🔊":"🔇"
}

function playSound(){
if(!soundOn)return
let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")
audio.play()
}

function hideMenu(){
document.getElementById("menu").style.display="none"
}

function backMenu(){
gameArea.innerHTML=""
document.getElementById("menu").style.display="block"
}






/* 움직임 찾기 */

function startMotionGame(){

hideMenu()

const types=[
{class:"spin",text:"빙글빙글 도는 것을 누르세요"},
{class:"bounce",text:"점프하는 것을 누르세요"},
{class:"shake",text:"좌우로 흔들리는 것을 누르세요"}
]

let type=types[Math.floor(Math.random()*types.length)]

gameArea.innerHTML=`<h2>${type.text}</h2>`

const grid=document.createElement("div")
grid.className="cardGrid"

let answer=Math.floor(Math.random()*6)

for(let i=0;i<6;i++){

let card=document.createElement("div")
card.className="card"
card.textContent="⭐"

if(i===answer){
card.classList.add(type.class)
}

card.onclick=()=>{

if(i===answer){
playSound()
startMotionGame()
}else{
alert("다시 해보세요!")
}

}

grid.appendChild(card)

}

gameArea.appendChild(grid)

let back=document.createElement("button")
back.className="backBtn"
back.textContent="← 메뉴"
back.onclick=backMenu
gameArea.appendChild(back)

}







/* 색깔 찾기 */

function startColorGame(){

hideMenu()

const colors=[
{name:"빨간색",value:"red"},
{name:"파란색",value:"blue"},
{name:"초록색",value:"green"},
{name:"노란색",value:"yellow"},
{name:"보라색",value:"purple"},
{name:"주황색",value:"orange"}
]

let target=colors[Math.floor(Math.random()*colors.length)]

gameArea.innerHTML=`<h2>${target.name}을 누르세요</h2>`

const grid=document.createElement("div")
grid.className="cardGrid"

let answerIndex=Math.floor(Math.random()*6)

for(let i=0;i<6;i++){

let card=document.createElement("div")
card.className="colorCard"

let color

if(i===answerIndex){
color=target
}else{

do{
color=colors[Math.floor(Math.random()*colors.length)]
}while(color.value===target.value)

}

card.style.background=color.value

card.onclick=()=>{

if(color.value===target.value){
playSound()
startColorGame()
}else{
alert("다시 해보세요!")
}

}

grid.appendChild(card)

}

gameArea.appendChild(grid)

let back=document.createElement("button")
back.className="backBtn"
back.textContent="← 메뉴"
back.onclick=backMenu
gameArea.appendChild(back)

}







/* 카드 짝 맞추기 */

let firstCard=null
let lock=false
let matched=0

function startMemoryGame(){

hideMenu()

gameArea.innerHTML="<h2>같은 카드를 맞춰보세요</h2>"

firstCard=null
lock=false
matched=0

const icons=["🍎","🍌","🍇","🍓"]
let cards=[...icons,...icons]

cards.sort(()=>Math.random()-0.5)

const grid=document.createElement("div")
grid.className="cardGrid"

cards.forEach(icon=>{

let card=document.createElement("div")
card.className="card"
card.textContent="❓"
card.dataset.icon=icon

card.onclick=()=>{

if(lock||card.textContent!=="❓")return

card.textContent=icon

if(!firstCard){
firstCard=card
return
}

if(firstCard.dataset.icon===card.dataset.icon){

playSound()
matched++
firstCard=null

if(matched===4){

setTimeout(()=>{
alert("잘했어요!")
startMemoryGame()
},600)

}

}else{

lock=true

setTimeout(()=>{

card.textContent="❓"
firstCard.textContent="❓"
firstCard=null
lock=false

},800)

}

}

grid.appendChild(card)

})

gameArea.appendChild(grid)

let back=document.createElement("button")
back.className="backBtn"
back.textContent="← 메뉴"
back.onclick=backMenu
gameArea.appendChild(back)

}

</script>

</body>
</html>
