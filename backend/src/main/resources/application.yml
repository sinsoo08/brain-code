spring:
  datasource:
    url: jdbc:h2:mem:braincoder;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: a9194f30ba122a500ed8ef617c6b7fcc
            client-secret: y3i8jYnXz3Z015R4q14sppFUQeU2d5IV
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled}
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

app:
  jwt:
    secret: YnJhaW5jb2Rlci1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tMjAyNC0tLS0tLS0t
    access-expiration: 1800000       # 30분
    refresh-expiration: 1209600000   # 14일
  oauth2:
    redirect-uri: http://localhost:5173/oauth2/redirect

logging:
  level:
    org.springframework.security: DEBUG
    com.braincoder.security.JwtAuthenticationFilter: DEBUG
