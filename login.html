<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 브레인 코드</title>
    <link rel="icon" href="img/brain-blue.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-dark:    #3A6BB5;
            --blue-mid:     #5B8FCC;
            --blue-pale:    #C8DEF5;
            --blue-softest: #EBF3FC;
            --white:        #FFFFFF;
            --text-dark:    #1E3A5F;
            --text-mid:     #4A6A90;
            --text-light:   #7A9DC0;
            --blue-dark:    #4A7EC7;
            --blue-mid:     #6B9FD4;
            --blue-light:   #A8C8E8;
            --blue-pale:    #D6E8F7;
            --blue-softest: #EEF5FC;
            --white:        #FFFFFF;
            --text-dark:    #2B4A6F;
            --text-mid:     #4A6F96;
            --text-light:   #7A9DBF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #E8F1FA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(74,126,199,0.13) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(91,143,204,0.10) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(214,232,247,0.3) 0%, transparent 70%);
        }

        /* ── 플로팅 장식 원 ── */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 480px; height: 480px;
            top: -140px; left: -140px;
            background: radial-gradient(circle, rgba(74,126,199,0.12), transparent 70%);
        }
        body::after {
            width: 380px; height: 380px;
            bottom: -100px; right: -100px;
            background: radial-gradient(circle, rgba(91,143,204,0.10), transparent 70%);
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--blue-dark);
            padding: 14px 40px;
            box-shadow: 0 2px 12px rgba(74,126,199,0.25);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .brain-logo { width: 44px; height: 44px; border-radius: 8px; }

        .logo-text {
            font-family: 'Jua', sans-serif;
            font-size: 22px;
            color: white;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 24px;
            margin: 0;
            padding: 0;
        }

        .menu a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .menu a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ── 본문 ── */
        .page-body {
            flex: 1;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
        }

        /* ── 카드 ── */
        .card {
            background: rgba(255,255,255,0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 48px 44px 44px;
            width: 100%;
            max-width: 420px;
            border: 1.5px solid rgba(255,255,255,0.9);
            box-shadow:
                0 2px 0px rgba(255,255,255,0.8) inset,
                0 16px 48px rgba(58,107,181,0.14),
                0 4px 16px rgba(58,107,181,0.08);
            animation: cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── 카드 헤더 ── */
        .card-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 68px; height: 68px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--blue-softest), var(--blue-pale));
            border: 1.5px solid rgba(74,126,199,0.18);
            box-shadow: 0 4px 16px rgba(58,107,181,0.14);
            margin-bottom: 16px;
        }

        .logo-wrap img {
            width: 42px; height: 42px;
        }

        .card-header h1 {
            font-family: 'Jua', sans-serif;
            font-size: 27px;
            color: var(--text-dark);
            margin-bottom: 7px;
            letter-spacing: -0.5px;
        }

        .card-header p {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
        }

        /* ── 입력 필드 ── */
        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 7px;
            letter-spacing: 0.2px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.2s;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 1.5px solid var(--blue-pale);
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-dark);
            background: var(--blue-softest);
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--blue-mid);
            background: white;
            box-shadow: 0 0 0 3.5px rgba(91,143,204,0.15);
        }

        input::placeholder { color: #B0C8E0; }

        /* ── 로그인 버튼 ── */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
            margin-top: 8px;
            box-shadow: 0 4px 18px rgba(58,107,181,0.30);
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 26px rgba(58,107,181,0.36);
            filter: brightness(1.06);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(58,107,181,0.20);
        }

        /* ── 소셜 로그인 구분선 ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 20px;
            color: var(--text-light);
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--blue-pale);
        }

        /* ── 소셜 버튼 ── */
        .social-row {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 10px;
            border-radius: 12px;
            border: 1.5px solid var(--blue-pale);
            background: white;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.18s, box-shadow 0.18s;
            color: var(--text-dark);
            text-decoration: none;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .social-btn.google { color: #444; }
        .social-btn.google:hover { border-color: #dadce0; background: #fafafa; }

        .social-btn.kakao {
            background: #FEE500;
            border-color: #FEE500;
            color: #3C1E1E;
        }
        .social-btn.kakao:hover { background: #f5dc00; border-color: #f5dc00; }

        .social-btn svg { flex-shrink: 0; }

        /* ── 회원가입 링크 ── */
        .signup-link {
            text-align: center;
            margin-top: 22px;
            font-size: 13.5px;
            color: var(--text-light);
        }

        .signup-link a {
            color: var(--blue-dark);
            font-weight: 700;
            text-decoration: none;
            margin-left: 4px;
        }

        .signup-link a:hover { text-decoration: underline; }

        /* ── 알림 박스 ── */
        #alert-box {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(-100%);
            padding: 14px 32px;
            border-radius: 0 0 16px 16px;
            font-weight: 600;
            font-family: 'Noto Sans KR', sans-serif;
            z-index: 1000;
            box-shadow: 0 6px 24px rgba(0,0,0,0.14);
            font-size: 14px;
            transition: transform 0.36s cubic-bezier(0.22,1,0.36,1);
            white-space: nowrap;
        }

        #alert-box.show { transform: translateX(-50%) translateY(0); }
        #alert-box.success { background: #4CA896; color: white; }
        #alert-box.error   { background: #D96B6B; color: white; }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            .navbar { padding: 12px 24px; }
            .menu a { font-size: 13px; padding: 6px 10px; }
            .card { padding: 40px 32px 36px; }
        }

        @media (max-width: 480px) {
            .navbar { padding: 10px 16px; }
            .logo-text { font-size: 17px; }
            .menu { gap: 2px; }
            .menu a { font-size: 12px; padding: 5px 8px; }
            .card { padding: 32px 20px 28px; border-radius: 22px; }
            .logo-wrap { width: 56px; height: 56px; border-radius: 16px; }
            .logo-wrap img { width: 34px; height: 34px; }
            .card-header h1 { font-size: 23px; }
            .social-btn { font-size: 12.5px; padding: 11px 8px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="main.html" class="nav-left">
            <img src="img/brain-blue.png" class="brain-logo" alt="로고">
            <span class="logo-text">브레인 코드</span>
        </a>
        <ul class="menu">
            <li><a href="main.html">홈</a></li>
            <li><a href="signup.html">회원가입</a></li>
        </ul>
    </nav>

    <div class="page-body">
        <div class="card">
            <div class="card-header">
                <div class="logo-wrap">
                    <img src="img/brain-blue.png" alt="로고">
                </div>
                <h1>로그인</h1>
                <p>브레인 코드에 오신 것을 환영해요 👋</p>
            </div>

            <div class="field">
                <label for="emailInput">이메일</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </span>
                    <input type="email" id="emailInput" placeholder="example@email.com">
                </div>
            </div>

            <div class="field">
                <label for="passwordInput">비밀번호</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="passwordInput" placeholder="비밀번호를 입력하세요">
                </div>
            </div>

            <button class="login-btn" onclick="login()">로그인</button>

            <div class="divider">또는</div>

            <div class="social-row">
                <!-- Google -->
                <button class="social-btn google" onclick="loginWithGoogle()">
                    <svg width="17" height="17" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    구글 로그인
                </button>

                <!-- Kakao -->
                <button class="social-btn kakao" onclick="loginWithKakao()">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="#3C1E1E">
                        <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.697 5.077 4.267 6.495L5.2 21l4.523-2.872C10.44 18.37 11.21 18.5 12 18.5c5.523 0 10-3.477 10-7.7S17.523 3 12 3z"/>
                    </svg>
                    카카오 로그인
                </button>
            </div>

            <div class="signup-link">
                계정이 없으신가요? <a href="signup.html">회원가입</a>
            </div>
        </div>
    </div>

    <div id="alert-box"></div>

    <!-- Google OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <div id="g_id_onload"
        data-client_id="YOUR_CLIENT_ID"
        data-callback="handleCredentialResponse">
    </div>

    <!-- Kakao SDK -->
    <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

    <script>
        /* ── 알림 ── */
        function showAlert(message, type = 'error') {
            const box = document.getElementById("alert-box");
            box.textContent = message;
            box.className = type;
            box.classList.add('show');
            clearTimeout(box._timer);
            box._timer = setTimeout(() => { box.classList.remove('show'); }, 3000);
        }

        /* ── 이메일 로그인 ── */
        function login() {
            const email = document.getElementById("emailInput").value.trim();
            const pw    = document.getElementById("passwordInput").value;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !pw)            return showAlert("이메일과 비밀번호를 입력해주세요!");
            if (!emailPattern.test(email)) return showAlert("올바른 이메일 형식을 입력해주세요!");

            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("userEmail", email);
            showAlert("로그인 되었습니다!", "success");
            setTimeout(() => { window.location.href = "profile.html"; }, 1000);
        }

        /* ── 엔터키 지원 ── */
        document.getElementById("passwordInput").addEventListener("keydown", e => {
            if (e.key === "Enter") login();
        });

        /* ── 구글 로그인 ── */
        function handleCredentialResponse(response) {
            console.log("구글 토큰:", response.credential);
            showAlert("구글 로그인 성공!", "success");
        }

        function loginWithGoogle() {
            // Google One Tap 또는 Popup 방식 연동 필요
            showAlert("구글 로그인 준비 중입니다.", "error");
        }

        /* ── 카카오 로그인 ── */
        if (typeof Kakao !== 'undefined') {
            Kakao.init("YOUR_APP_KEY");
        }

        function loginWithKakao() {
            if (typeof Kakao === 'undefined') {
                return showAlert("카카오 SDK 로드 실패", "error");
            }
            Kakao.Auth.login({
                success: function(authObj) {
                    console.log("카카오 토큰:", authObj.access_token);
                    showAlert("카카오 로그인 성공!", "success");
                },
                fail: function(err) {
                    console.error(err);
                    showAlert("카카오 로그인 실패", "error");
                }
            });
        }
    </script>

</body>
</html>
