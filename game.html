<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>뇌 기능 훈련 게임 — 브레인 코드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap');

        :root {
            --blue-dark:    #4A7EC7;
            --blue-mid:     #6B9FD4;
            --blue-light:   #A8C8E8;
            --blue-pale:    #D6E8F7;
            --blue-softest: #EEF5FC;
            --white:        #FFFFFF;
            --text-dark:    #2B4A6F;
            --text-mid:     #4A6F96;
            --text-light:   #7A9DBF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #E8F1FA;
            min-height: 100vh;
            display: flex; flex-direction: column;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(74,126,199,0.13) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(91,143,204,0.10) 0%, transparent 50%);
        }
        body::before {
            content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            width: 480px; height: 480px; top: -140px; left: -140px;
            background: radial-gradient(circle, rgba(74,126,199,0.12), transparent 70%);
        }

        /* ── 네비게이션 바 ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--blue-dark);
            padding: 14px 40px;
            box-shadow: 0 2px 12px rgba(74,126,199,0.25);
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; cursor: pointer;
            border: none; background: none; padding: 0;
        }
        .brain-logo { width: 44px; height: 44px; border-radius: 8px; object-fit: contain; }
        .logo-text  { font-family: 'Jua', sans-serif; font-size: 22px; color: white; }
        .nav-right  { display: flex; align-items: center; gap: 8px; }
        .nav-btn {
            background: rgba(255,255,255,0.15);
            border: 1.5px solid rgba(255,255,255,0.28);
            color: white; font-family: 'Noto Sans KR', sans-serif;
            font-size: 15px; font-weight: 500;
            padding: 8px 20px; border-radius: 20px; cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.25); }

        /* ── 페이지 바디 ── */
        .page-body { flex: 1; position: relative; z-index: 1; padding: 16px 20px 16px; }
        .page-inner { max-width: 980px; margin: 0 auto; }

        #brainSelectView { display: block; }
        #gameView        { display: none; }

        .page-hero { text-align: center; margin-bottom: 10px; }
        .page-hero h1 { font-family: 'Jua', sans-serif; font-size: 26px; color: var(--text-dark); margin-bottom: 4px; }
        .page-hero p  { font-size: 15px; color: var(--text-light); }

        /* ── 뇌 스테이지 ── */
        .brain-stage {
            position: relative; width: 100%;
            aspect-ratio: 1280 / 698; max-height: calc(100vh - 200px);
            margin: 0 auto; border-radius: 20px; overflow: hidden;
            background: linear-gradient(160deg, var(--blue-softest) 0%, #f0f8ff 100%);
            border: 2px solid var(--blue-pale);
            box-shadow: 0 8px 32px rgba(74,126,199,0.14);
        }
        .brain-img {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: fill; pointer-events: none; user-select: none;
            filter: drop-shadow(0 6px 18px rgba(74,126,199,0.15));
        }
        .brain-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
        .region { fill: transparent; cursor: pointer; transition: fill 0.15s; }

        /* ── 호버 레이블 ── */
        .brain-label {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.97); border: 2px solid var(--blue-pale);
            border-radius: 40px; padding: 14px 32px;
            display: none; flex-direction: column; align-items: center; gap: 4px;
            box-shadow: 0 6px 24px rgba(74,126,199,0.22);
            pointer-events: none; white-space: nowrap;
        }
        .brain-label-name { font-family: 'Jua', sans-serif; font-size: 26px; color: var(--blue-dark); }
        .brain-label-desc { font-size: 16px; color: var(--text-mid); }
        .brain-label-hint { font-size: 14px; color: var(--text-light); margin-top: 2px; }

        /* ── 게임 카드 ── */
        .game-card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1.5px solid rgba(255,255,255,0.9);
            box-shadow: 0 16px 48px rgba(58,107,181,0.12), 0 4px 16px rgba(58,107,181,0.07);
            overflow: hidden;
            animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── 작은 헤더 바 ── */
        .game-header-bar {
            display: flex; align-items: center;
            justify-content: space-between; gap: 12px;
            padding: 16px 28px;
            background: var(--blue-softest);
            border-bottom: 1.5px solid var(--blue-pale);
        }
        .game-region-info { display: flex; align-items: center; gap: 12px; }
        .game-region-thumb { width: 44px; height: 44px; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(74,126,199,0.2)); }
        .game-region-name  { font-family: 'Jua', sans-serif; font-size: 20px; color: var(--text-dark); }

        /* ── 게임 셸 (흰 영역) ── */
        .game-shell {
            background: white; padding: 36px 40px 44px;
            height: 460px; overflow: hidden;
            display: flex; flex-direction: column; gap: 20px;
            align-items: center; justify-content: center;
        }

        /* ── 게임 내부 타이틀 ── */
        .game-inner-title { font-family: 'Jua', sans-serif; font-size: 30px; color: var(--text-dark); text-align: center; margin-bottom: 10px; }
        .game-inner-sub   { font-size: 20px; color: var(--text-mid); text-align: center; line-height: 1.5; }

        /* ── 센터 박스 ── */
        .center-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; text-align: center; }

        /* ── 큰 숫자/단어 ── */
        .big-number, .big-word { font-family: 'Jua', sans-serif; font-size: 72px; color: var(--blue-dark); letter-spacing: 4px; line-height: 1.1; }

        /* ── 버튼 ── */
        .btn {
            border: none; border-radius: 16px; padding: 16px 28px;
            background: var(--blue-pale); color: var(--text-dark);
            cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
            font-size: 18px; font-weight: 700; transition: 0.18s ease;
            box-shadow: 0 3px 12px rgba(74,126,199,0.15);
        }
        .btn:hover { background: var(--blue-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74,126,199,0.28); }
        .btn:active { transform: translateY(0); }
        .btn.strong {
            background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
            color: white; font-size: 20px; padding: 18px 40px;
            box-shadow: 0 6px 20px rgba(74,126,199,0.36);
        }
        .btn.strong:hover { box-shadow: 0 10px 28px rgba(74,126,199,0.46); filter: brightness(1.06); }
        .btn.ghost {
            background: white; border: 2px solid var(--blue-pale);
            color: var(--text-mid); font-size: 16px; padding: 12px 22px; box-shadow: none;
        }
        .btn.ghost:hover { background: var(--blue-softest); border-color: var(--blue-light); }

        /* ── 입력 ── */
        .answer-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .text-input {
            border: 2.5px solid var(--blue-pale); background: var(--blue-softest);
            border-radius: 16px; padding: 16px 22px; color: var(--text-dark);
            font-family: 'Noto Sans KR', sans-serif; font-size: 22px; outline: none;
            text-align: center; transition: border-color 0.18s, box-shadow 0.18s; min-width: 180px;
        }
        .text-input:focus { border-color: var(--blue-mid); background: white; box-shadow: 0 0 0 4px rgba(74,126,199,0.12); }

        /* ── 퀴즈 그리드 ── */
        .quiz-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 320px; width: 100%; }
        .quiz-cell {
            aspect-ratio: 1; border: 2.5px solid var(--blue-light); border-radius: 20px;
            background: linear-gradient(135deg, var(--blue-pale), var(--blue-softest));
            font-size: 38px; cursor: pointer; transition: 0.15s ease;
            box-shadow: 0 4px 14px rgba(74,126,199,0.14);
            display: flex; align-items: center; justify-content: center;
        }
        .quiz-cell:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 10px 24px rgba(74,126,199,0.28); background: linear-gradient(135deg, var(--blue-light), var(--blue-pale)); }
        .quiz-cell:active { transform: scale(0.97); }

        /* ── 비주얼 그리드 ── */
        .visual-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; width: 100%; }
        .visual-card {
            aspect-ratio: 1; border: 2.5px solid var(--blue-pale); border-radius: 16px;
            cursor: pointer; font-size: 34px; background: white; transition: 0.15s ease;
            box-shadow: 0 4px 14px rgba(74,126,199,0.10);
            display: flex; align-items: center; justify-content: center;
        }
        .visual-card:hover { transform: translateY(-4px) scale(1.05); border-color: var(--blue-light); box-shadow: 0 10px 24px rgba(74,126,199,0.22); }
        .visual-card.selected { background: linear-gradient(135deg, var(--blue-pale), var(--blue-softest)); border-color: var(--blue-dark); box-shadow: 0 4px 18px rgba(74,126,199,0.32); }
        .temporal-choice.selected { background: linear-gradient(135deg, var(--blue-pale), var(--blue-softest)) !important; border-color: var(--blue-dark) !important; }

        /* ── 반응속도 박스 ── */
        .reaction-box {
            width: min(100%, 440px); min-height: 220px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 24px; border: 3px dashed var(--blue-light);
            background: var(--blue-softest); margin: 0 auto;
            font-family: 'Jua', sans-serif; font-size: 28px;
            cursor: pointer; color: var(--text-mid); transition: 0.2s ease; user-select: none;
        }
        .reaction-box:hover { border-color: var(--blue-dark); background: var(--blue-pale); }

        /* ── 결과 ── */
        .result-emoji { font-size: 80px; line-height: 1; }
        .result-msg   { font-family: 'Jua', sans-serif; font-size: 44px; color: var(--text-dark); }

        /* ── 점수 표시 ── */
        .score-display {
            font-family: 'Jua', sans-serif; font-size: 18px;
            color: var(--blue-dark);
            background: var(--blue-pale); border-radius: 20px;
            padding: 6px 16px; white-space: nowrap;
        }

        .hidden { display: none !important; }

        /* ── 모달 ── */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(30,60,110,0.38); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
        .modal-backdrop.show { display: flex; }
        .modal { width: min(520px,96vw); background: white; border-radius: 24px; padding: 28px; box-shadow: 0 20px 60px rgba(30,70,130,0.22); border: 1.5px solid var(--blue-pale); animation: cardIn 0.28s cubic-bezier(0.34,1.4,0.64,1); }
        .modal h3 { font-family: 'Jua', sans-serif; font-size: 22px; color: var(--text-dark); margin: 0 0 8px; }
        .modal p  { color: var(--text-light); line-height: 1.7; font-size: 15px; margin: 0 0 16px; }
        .modal h4 { font-family: 'Jua', sans-serif; color: var(--text-dark); margin: 0 0 14px; font-size: 18px; }
        .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px; }
        .modal-grid { display: grid; gap: 10px; }
        .setting-item { background: var(--blue-softest); border: 1.5px solid var(--blue-pale); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 15px; color: var(--text-dark); }
        .setting-item label { font-family: 'Jua', sans-serif; font-size: 15px; color: var(--text-dark); }
        .select { border: 1.5px solid var(--blue-pale); background: var(--blue-softest); border-radius: 10px; padding: 8px 12px; color: var(--text-dark); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; }
        .stats-modal { width: min(760px,96vw) !important; max-height: 90vh; overflow-y: auto; }
        .detail-row { background: var(--blue-softest); border: 1.5px solid var(--blue-pale); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
        .detail-row-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-family: 'Jua', sans-serif; color: var(--text-dark); font-size: 16px; }
        .detail-row-head span:last-child { font-size: 13px; color: var(--text-light); font-family: 'Noto Sans KR', sans-serif; }
        .detail-meta { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; font-size: 13px; color: var(--text-light); }
        .detail-meta div { background: white; border-radius: 12px; padding: 10px; border: 1px solid var(--blue-pale); text-align: center; }
        .detail-meta strong { color: var(--blue-dark); display: block; font-size: 17px; margin-top: 4px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--blue-softest); }
        ::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 6px; }

        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; }
            .game-shell { padding: 24px 20px 28px; }
            .detail-meta { grid-template-columns: repeat(2,1fr); }
        }
        @media (max-width: 480px) {
            .navbar { padding: 10px 14px; }
            .logo-text { font-size: 17px; }
            .brain-logo { width: 36px; height: 36px; }
            .page-body { padding: 18px 12px 36px; }
            .page-hero h1 { font-size: 26px; }
            .game-shell { padding: 20px 14px 24px; }
            .game-inner-title { font-size: 24px; }
            .game-inner-sub { font-size: 17px; }
            .big-number, .big-word { font-size: 54px; }
            .btn.strong { font-size: 17px; padding: 16px 28px; }
            .quiz-cell { font-size: 28px; }
            .visual-card { font-size: 32px; }
        }
    </style>
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar">
    <button class="nav-logo" id="logoBtn">
        <img src="img/brain-blue.png" class="brain-logo" alt="브레인 코드 로고" />
        <span class="logo-text">브레인 코드</span>
    </button>
    <div class="nav-right">
        <button class="nav-btn" id="openStatsBtn">통계</button>
        <button class="nav-btn" id="openSettingsBtn">설정</button>
    </div>
</nav>

<main class="page-body">
    <div class="page-inner">

        <!-- 뇌 영역 선택 뷰 -->
        <div id="brainSelectView">
            <div class="page-hero">
                <h1>어떤 게임을 할까요?</h1>
                <p>뇌의 영역에 마우스를 올리고 클릭해 보세요!</p>
            </div>
            <div class="brain-stage" id="brainStage">
                <img class="brain-img"
                     src="img/brain.png"
                     alt="뇌 그림" />
                <svg class="brain-svg" id="brainSvg" viewBox="0 0 1280 698" preserveAspectRatio="none">
                    <defs>
                        <mask id="dimMask">
                            <rect x="0" y="0" width="1280" height="698" fill="white"/>
                            <polygon id="brightRegion" points="" fill="black"/>
                        </mask>
                    </defs>
                    <rect id="dimOverlay" x="0" y="0" width="1280" height="698"
                          fill="rgba(10,25,60,0.58)" mask="url(#dimMask)"
                          style="display:none; pointer-events:none;"/>
                </svg>
                <div class="brain-label" id="brainLabel">
                    <span class="brain-label-name" id="brainLabelName"></span>
                    <span class="brain-label-desc" id="brainLabelDesc"></span>
                    <span class="brain-label-hint">클릭해서 게임 시작!</span>
                </div>
            </div>
        </div>

        <!-- 게임 뷰 -->
        <div id="gameView">
            <div class="game-card">
                <div class="game-header-bar">
                    <div class="game-region-info">
                        <img class="game-region-thumb" id="gameRegionThumb" src="img/brain-blue.png" alt="" />
                        <span class="game-region-name" id="gameRegionName"></span>
                        <span class="score-display" id="todayScoreDisplay">점수: 0</span>
                    </div>
                    <button class="btn ghost" id="backToBrainBtn">← 영역 다시 선택</button>
                </div>
                <div class="game-shell" id="gameShell">
                    <div class="center-box" style="min-height:300px;">
                        <div class="game-inner-title">영역을 선택해 주세요</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<div style="display:none">
    <div id="totalPlaysValue">0</div>
    <div id="bestScoreValue">0</div>
    <div id="accuracyValue">0%</div>
    <div id="bestReactionValue">-</div>
</div>

<!-- 설정 모달 -->
<div class="modal-backdrop" id="settingsModal">
    <div class="modal">
        <div class="modal-head">
            <h3>설정</h3>
            <button class="btn ghost" style="font-size:15px;padding:10px 18px;" id="closeSettingsBtn">닫기</button>
        </div>
        <p>게임 진행에 필요한 기본 옵션입니다.</p>
        <div class="modal-grid">
            <div class="setting-item">
                <label for="soundToggle">효과 문구 표시</label>
                <select class="select" id="soundToggle"><option value="on">켜기</option><option value="off">끄기</option></select>
            </div>
            <div class="setting-item">
                <label for="autoShowStats">결과 후 통계 문구</label>
                <select class="select" id="autoShowStats"><option value="on">켜기</option><option value="off">끄기</option></select>
            </div>
        </div>
    </div>
</div>

<!-- 통계 모달 -->
<div class="modal-backdrop" id="statsModal">
    <div class="modal stats-modal">
        <div class="modal-head" style="position:sticky;top:0;background:white;z-index:10;padding-bottom:12px;border-bottom:1.5px solid var(--blue-pale);">
            <h3>플레이 통계</h3>
            <div style="display:flex;gap:8px;">
                <button class="btn ghost" style="font-size:14px;padding:9px 16px;" id="resetStatsBtn">초기화</button>
                <button class="btn ghost" style="font-size:14px;padding:9px 16px;" id="closeStatsBtn">닫기</button>
            </div>
        </div>
        <div class="modal-grid" id="quickStatsModalBody" style="margin-top:20px;"></div>
        <div style="margin-top:28px;border-top:1.5px solid var(--blue-pale);padding-top:20px;">
            <h4>게임별 세부 기록</h4>
            <div id="detailStatsInModal"></div>
        </div>
    </div>
</div>

<script>
const STORAGE_KEY    = "brain_game_stats_v4";
const SETTINGS_KEY   = "brain_game_settings_v1";
const TODAY_SCORE_KEY = "brain_today_score_v2";

const regionImages = {
    frontal: "img/frontal-lobe.png", parietal: "img/parietal-lobe.png",
    temporal: "img/hippocampus.png", occipital: "img/occipital-lobe.png",
    cerebellum: "img/cerebellum.png"
};

const regionData = {

    totalPlays:0, bestScore:0, totalCorrect:0, totalAttempts:0, bestReaction:null,
    regions:{
        frontal:{plays:0,bestScore:0,correct:0,attempts:0,bestReaction:null},

        cerebellum:{plays:0,bestScore:0,correct:0,attempts:0,bestReaction:null}
    }
});
const defaultSettings = () => ({ effectText:"on", resultHint:"on" });

let stats             = loadStats();
let settings          = loadSettings();
let todayScores       = loadTodayScore();
let selectedRegionKey = null;
let activeGameState   = null;

const brainSelectView  = document.getElementById("brainSelectView");
const gameView         = document.getElementById("gameView");
const gameShell        = document.getElementById("gameShell");

function loadStats()    { try{ const p=JSON.parse(localStorage.getItem(STORAGE_KEY));  if(p&&p.regions)return p; }catch(e){} return defaultStats(); }
function saveStats()    { localStorage.setItem(STORAGE_KEY,  JSON.stringify(stats)); }
function loadSettings() { try{ const p=JSON.parse(localStorage.getItem(SETTINGS_KEY)); if(p)return p; }catch(e){} return defaultSettings(); }
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
function loadTodayScore() {
    try {
        const d = JSON.parse(localStorage.getItem(TODAY_SCORE_KEY));
        const today = new Date().toISOString().slice(0,10);
        if (d && d.date === today && d.scores && typeof d.scores === 'object') return d.scores;
    } catch(e) {}
    return {frontal:0, parietal:0, temporal:0, occipital:0, cerebellum:0};
}
function saveTodayScore() {
    localStorage.setItem(TODAY_SCORE_KEY, JSON.stringify({
        date: new Date().toISOString().slice(0,10), scores: todayScores
    }));
}
function updateScoreDisplay() {
    const el = document.getElementById("todayScoreDisplay");
    if (el && selectedRegionKey) el.textContent = `점수: ${todayScores[selectedRegionKey]}`;
}

/* ── 뇌 맵 ── */
function ptsStr(pts) { return pts.map(p=>p.join(",")).join(" "); }

function initBrainMap() {
    const svg = document.getElementById("brainSvg");
    Object.values(regionData).forEach(region => {
        const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
        poly.classList.add("region");
        poly.setAttribute("points", ptsStr(region.pts));
        poly.addEventListener("mouseenter", () => hoverRegion(region.key));
        poly.addEventListener("mouseleave", unhoverRegion);
        poly.addEventListener("click",      () => selectRegion(region.key));
        poly.addEventListener("touchstart", e => { e.preventDefault(); selectRegion(region.key); }, {passive:false});
        svg.appendChild(poly);
    });
}

function hoverRegion(key) {
    const r = regionData[key];
    document.getElementById("brightRegion").setAttribute("points", ptsStr(r.pts));
    document.getElementById("dimOverlay").style.display = "block";
    document.getElementById("brainLabelName").textContent = r.name;
    document.getElementById("brainLabelDesc").textContent = r.desc;
    document.getElementById("brainLabel").style.display   = "flex";
}
function unhoverRegion() {
    document.getElementById("dimOverlay").style.display = "none";
    document.getElementById("brainLabel").style.display = "none";
}

/* ── 선택 / 뒤로가기 ── */
function selectRegion(key) {
    selectedRegionKey = key;
    document.getElementById("gameRegionThumb").src       = regionImages[key];
    document.getElementById("gameRegionName").textContent = regionData[key].name;
    brainSelectView.style.display = "none";
    gameView.style.display        = "block";
    updateScoreDisplay();
    window.scrollTo({top:0, behavior:"smooth"});
    startSelectedGame();
}
function backToBrain() {
    selectedRegionKey = null; activeGameState = null;
    gameView.style.display        = "none";
    brainSelectView.style.display = "block";
    unhoverRegion();
}

/* ── 게임 공통 ── */
function renderGameLayout(title, subtitle, html) {
    gameShell.innerHTML = `
        <div style="text-align:center;width:100%;">
            <div class="game-inner-title">${title}</div>
            <div class="game-inner-sub">${subtitle}</div>
        </div>${html}`;
}
function startSelectedGame() {
    if (!selectedRegionKey) return;
    const k = selectedRegionKey;
    if (k==="frontal")    renderFrontalGame();
    if (k==="parietal")   renderParietalGame();
    if (k==="temporal")   renderTemporalGame();
    if (k==="occipital")  renderOccipitalGame();
    if (k==="cerebellum") renderCerebellumGame();
}
function rs(k) { return stats.regions[k]; }
function registerPlay(k)    { stats.totalPlays++; rs(k).plays++; }
function registerScore(k,s) { stats.bestScore=Math.max(stats.bestScore,s); rs(k).bestScore=Math.max(rs(k).bestScore,s); }
function registerAttempt(k,ok) { stats.totalAttempts++; rs(k).attempts++; if(ok){stats.totalCorrect++;rs(k).correct++;} }
function registerReaction(k,ms){ if(!stats.bestReaction||ms<stats.bestReaction)stats.bestReaction=ms; if(!rs(k).bestReaction||ms<rs(k).bestReaction)rs(k).bestReaction=ms; }
function finishGame(k,score) {
    registerScore(k,score);
    if (score > 0) { todayScores[k] += score; saveTodayScore(); updateScoreDisplay(); }
    saveStats(); renderStats();
}

/* ── 전두엽 ── */
function renderFrontalGame() {
    const nums = Array.from({length:4}, ()=>Math.floor(Math.random()*10));
    activeGameState = {type:"frontal", answer:nums.join("")};
    renderGameLayout("전두엽 게임 · 숫자 기억","아래 숫자를 잘 기억해 주세요!",
        `<div class="center-box">
            <div class="big-number">${nums.join("  ")}</div>
            <div style="font-size:18px;color:var(--text-light);">2초 뒤 사라져요</div>
        </div>`);
    setTimeout(()=>{
        if(!activeGameState||activeGameState.type!=="frontal")return;
        renderGameLayout("전두엽 게임 · 숫자 기억","기억한 숫자를 순서대로 입력해 보세요!",
            `<div class="center-box">
                <div class="answer-row">
                    <input class="text-input" id="fi" placeholder="숫자 입력" autocomplete="off" inputmode="numeric"/>
                    <button class="btn strong" id="fs">확인 ✓</button>
                </div>
            </div>`);
        const inp=document.getElementById("fi"); inp.focus();
        inp.addEventListener("keydown",e=>{if(e.key==="Enter")submitFrontal();});
        document.getElementById("fs").addEventListener("click",submitFrontal);
    },2000);
}
function submitFrontal() {
    if(!activeGameState||activeGameState.type!=="frontal")return;
    const val=(document.getElementById("fi")?.value||"").replace(/\s/g,"");
    const ok=val===activeGameState.answer;
    if(ok)registerPlay("frontal");
    registerAttempt("frontal",ok);
    finishGame("frontal",ok?40:0);
    renderGameLayout(ok?"정답이에요! 🎉":"아쉽지만 다시 해봐요!",
        ok?"기억력이 정말 좋네요!": `정답은 [${activeGameState.answer}] 이었어요`,
        `<div class="center-box">
            <div class="result-emoji">${ok?"⭐":"💪"}</div>
            <div class="result-msg">${ok?"정 답!":"오 답"}</div>
            <button class="btn strong" id="rf">다시하기 🔄</button>
        </div>`);
    document.getElementById("rf").addEventListener("click",startSelectedGame);
}

    const labels=Array.from({length:9},(_,i)=>i===ti?"⭐":"○");
    renderGameLayout("두정엽 게임 · 위치 찾기",
        `⭐ 칸을 찾아서 눌러 주세요! (${Math.floor(ti/3)+1}행 ${ti%3+1}열)`,
        `<div class="center-box">
            <div class="quiz-grid" id="pg">
                ${labels.map((l,i)=>`<button class="quiz-cell" data-i="${i}">${l}</button>`).join("")}
            </div>
        </div>`);
    document.querySelectorAll("#pg .quiz-cell").forEach(btn=>{
        btn.addEventListener("click",()=>{
            const ok=Number(btn.dataset.i)===activeGameState.ti;
            if(ok)registerPlay("parietal");
            registerAttempt("parietal",ok); finishGame("parietal",ok?30:0);
            renderGameLayout(ok?"정답이에요! 🎉":"아쉽지만 다시 해봐요!",
                ok?"위치를 잘 찾았어요!": `정답은 ${Math.floor(ti/3)+1}행 ${ti%3+1}열 이었어요`,
                `<div class="center-box">
                    <div class="result-emoji">${ok?"⭐":"💪"}</div>
                    <div class="result-msg">${ok?"정 답!":"오 답"}</div>
                    <button class="btn strong" id="rp">다시하기 🔄</button>
                </div>`);
            document.getElementById("rp").addEventListener("click",startSelectedGame);
        });
    });
}

/* ── 측두엽 ── */
function renderTemporalGame() {
    const all=["사과","바나나","포도","수박","복숭아","딸기","귤","참외","레몬","자두","배","키위"];
    const sel=[...all].sort(()=>Math.random()-.5).slice(0,3);
    activeGameState={type:"temporal",sel,picked:new Set()};
    renderGameLayout("측두엽 게임 · 단어 기억","아래 단어들을 잘 기억해 주세요!",
        `<div class="center-box">
            <div class="big-word" style="font-size:44px;letter-spacing:6px;">${sel.join("  ·  ")}</div>
            <div style="font-size:18px;color:var(--text-light);">잠시 뒤 선택 화면으로 바뀌어요</div>
        </div>`);
    setTimeout(()=>{
        if(!activeGameState||activeGameState.type!=="temporal")return;
        const wrongs=all.filter(w=>!sel.includes(w)).sort(()=>Math.random()-.5).slice(0,5);
        const choices=[...sel,...wrongs].sort(()=>Math.random()-.5);
        renderGameLayout("측두엽 게임 · 단어 기억","아까 본 단어를 모두 눌러서 선택해 주세요!",
            `<div class="center-box">
                <div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:480px;">
                    ${choices.map(w=>`<button type="button" class="btn ghost temporal-choice" data-w="${w}" style="font-size:20px;padding:16px 22px;min-width:110px;">${w}</button>`).join("")}
                </div>
                <button type="button" class="btn strong" id="ts">확인 ✓</button>
            </div>`);
        document.querySelectorAll(".temporal-choice").forEach(btn=>{
            btn.addEventListener("click",()=>{
                const w=btn.dataset.w;
                if(activeGameState.picked.has(w)){activeGameState.picked.delete(w);btn.classList.remove("selected");}
                else{activeGameState.picked.add(w);btn.classList.add("selected");}
            });
        });
        document.getElementById("ts").addEventListener("click",()=>{
            const as=new Set(activeGameState.sel), pk=activeGameState.picked;
            let ok=pk.size===as.size; if(ok)for(const w of as)if(!pk.has(w)){ok=false;break;}
            if(ok)registerPlay("temporal");
            registerAttempt("temporal",ok); finishGame("temporal",ok?30:0);
            renderGameLayout(ok?"정답이에요! 🎉":"아쉽지만 다시 해봐요!",
                `정답 단어: ${activeGameState.sel.join(", ")}`,
                `<div class="center-box">
                    <div class="result-emoji">${ok?"⭐":"💪"}</div>
                    <div class="result-msg">${ok?"정 답!":"오 답"}</div>
                    <button class="btn strong" id="rt">다시하기 🔄</button>
                </div>`);
            document.getElementById("rt").addEventListener("click",startSelectedGame);
        });
    },2500);
}

/* ── 후두엽 ── */
function renderOccipitalGame() {
    const shapes=["●","■","▲","◆","★"];
    const target=shapes[Math.floor(Math.random()*shapes.length)];
    const pool=[target];
    while(pool.length<9){const s=shapes[Math.floor(Math.random()*shapes.length)];if(s!==target)pool.push(s);}
    const board=pool.sort(()=>Math.random()-.5);
    activeGameState={type:"occipital",target,clicked:new Set(),board};
    renderGameLayout("후두엽 게임 · 모양 찾기",`"${target}" 모양을 모두 찾아서 눌러 주세요!`,
        `<div class="center-box">
            <div class="visual-grid" id="og">
                ${board.map((s,i)=>`<button type="button" class="visual-card" data-i="${i}">${s}</button>`).join("")}
            </div>
            <button type="button" class="btn strong" id="od">확인 ✓</button>
        </div>`);
    document.querySelectorAll("#og .visual-card").forEach(btn=>{
        btn.addEventListener("click",()=>{
            const i=Number(btn.dataset.i);
            if(activeGameState.clicked.has(i)){activeGameState.clicked.delete(i);btn.classList.remove("selected");}
            else{activeGameState.clicked.add(i);btn.classList.add("selected");}
        });
    });
    document.getElementById("od").addEventListener("click",()=>{
        const ci=board.map((s,i)=>s===target?i:-1).filter(i=>i>=0);
        let ok=ci.length===activeGameState.clicked.size; if(ok)for(const i of ci)if(!activeGameState.clicked.has(i)){ok=false;break;}
        if(ok)registerPlay("occipital");
        registerAttempt("occipital",ok); finishGame("occipital",ok?30:0);
        renderGameLayout(ok?"정답이에요! 🎉":"아쉽지만 다시 해봐요!",`찾아야 했던 모양: ${target}`,
            `<div class="center-box">
                <div class="result-emoji">${ok?"⭐":"💪"}</div>
                <div class="result-msg">${ok?"정 답!":"오 답"}</div>
                <button class="btn strong" id="ro">다시하기 🔄</button>
            </div>`);
        document.getElementById("ro").addEventListener("click",startSelectedGame);
    });
}

/* ── 소뇌 ── */
function renderCerebellumGame() {
    const waitMs=Math.floor(Math.random()*1500)+1200;
    activeGameState={type:"cerebellum",ready:false,startedAt:null,tooSoon:false};
    renderGameLayout("소뇌 게임 · 반응속도","화면이 바뀌면 바로 눌러 주세요!",
        `<div class="center-box">
            <div class="reaction-box" id="rb" style="font-size:26px;">⏳ 기다려 주세요...</div>
        </div>`);
    const rb=document.getElementById("rb");
    rb.addEventListener("click",()=>{
        if(!activeGameState||activeGameState.type!=="cerebellum")return;
        if(!activeGameState.ready){
            activeGameState.tooSoon=true;
            registerAttempt("cerebellum",false); finishGame("cerebellum",0);
            renderGameLayout("아직 이른걸요! 😅","파란색으로 바뀔 때까지 기다려 주세요!",
                `<div class="center-box">
                    <div class="result-emoji">⏳</div>
                    <div class="result-msg">조금 빨랐어요</div>
                    <button class="btn strong" id="rc">다시하기 🔄</button>
                </div>`);
            document.getElementById("rc").addEventListener("click",startSelectedGame);
            return;
        }
        const ms=Date.now()-activeGameState.startedAt;
        registerPlay("cerebellum"); registerAttempt("cerebellum",true); registerReaction("cerebellum",ms);
        const score=ms<=300?30:ms<=500?20:ms<=800?10:5;
        finishGame("cerebellum",score);
        renderGameLayout(ms<=400?"엄청 빠르네요! 🎉":ms<=700?"잘했어요! 😊":"다음엔 더 빠르게!",`반응 속도: ${ms}밀리초`,
            `<div class="center-box">
                <div class="big-number">${ms}<span style="font-size:32px;">ms</span></div>
                <div style="font-size:20px;color:var(--text-mid);">이번 점수: ${score}점</div>
                <button class="btn strong" id="rc">다시하기 🔄</button>
            </div>`);
        document.getElementById("rc").addEventListener("click",startSelectedGame);
    });
    setTimeout(()=>{
        if(!activeGameState||activeGameState.type!=="cerebellum"||activeGameState.tooSoon)return;
        activeGameState.ready=true; activeGameState.startedAt=Date.now();
        rb.innerHTML="지금 눌러요! 👆";
        rb.style.background="var(--blue-pale)"; rb.style.borderColor="var(--blue-dark)";
        rb.style.borderStyle="solid"; rb.style.color="var(--blue-dark)"; rb.style.fontSize="36px";
    },waitMs);
}

/* ── 통계 ── */
function fmtR(ms){return ms==null?"-":`${ms}ms`;}
function acc(c,a){return a?`${Math.round(c/a*100)}%`:"0%";}

function renderStats() {
    document.getElementById("totalPlaysValue").textContent  = stats.totalPlays;
    document.getElementById("bestScoreValue").textContent   = stats.bestScore;
    document.getElementById("accuracyValue").textContent    = acc(stats.totalCorrect,stats.totalAttempts);
    document.getElementById("bestReactionValue").textContent= fmtR(stats.bestReaction);
    const body=document.getElementById("quickStatsModalBody");
    if(body)body.innerHTML=`
        <div class="setting-item">전체 클리어 횟수 <strong>${stats.totalPlays}</strong></div>
        <div class="setting-item">최고 점수 <strong>${stats.bestScore}</strong></div>
        <div class="setting-item">전체 정답률 <strong>${acc(stats.totalCorrect,stats.totalAttempts)}</strong></div>
        <div class="setting-item">최고 반응속도 <strong>${fmtR(stats.bestReaction)}</strong></div>`;
    const detail=document.getElementById("detailStatsInModal");
    if(!detail)return; detail.innerHTML="";
    Object.values(regionData).forEach(region=>{
        const r=stats.regions[region.key], row=document.createElement("div");
        row.className="detail-row";
        row.innerHTML=`
            <div class="detail-row-head"><span>${region.name}</span><span>${region.desc}</span></div>
            <div class="detail-meta">
                <div>클리어 횟수<strong>${r.plays}</strong></div>
                <div>최고 점수<strong>${r.bestScore}</strong></div>
                <div>정답률<strong>${acc(r.correct,r.attempts)}</strong></div>
                <div>최고 반응속도<strong>${fmtR(r.bestReaction)}</strong></div>
            </div>`;
        detail.appendChild(row);
    });
}

function openModal(id){document.getElementById(id).classList.add("show");}
function closeModal(id){document.getElementById(id).classList.remove("show");}
function syncSettingsUI(){
    document.getElementById("soundToggle").value   = settings.effectText;
    document.getElementById("autoShowStats").value = settings.resultHint;
}

/* ── 이벤트 리스너 ── */
document.getElementById("logoBtn").addEventListener("click",()=>{ if(gameView.style.display!=="none")backToBrain(); });
document.getElementById("backToBrainBtn").addEventListener("click", backToBrain);
document.getElementById("openStatsBtn").addEventListener("click",   ()=>{ renderStats(); openModal("statsModal"); });
document.getElementById("openSettingsBtn").addEventListener("click",()=>openModal("settingsModal"));
document.getElementById("closeSettingsBtn").addEventListener("click",()=>closeModal("settingsModal"));
document.getElementById("closeStatsBtn").addEventListener("click",  ()=>closeModal("statsModal"));
document.getElementById("resetStatsBtn").addEventListener("click",()=>{
    if(!confirm("통계를 모두 초기화할까요?"))return;
    stats=defaultStats(); saveStats(); renderStats();
});
document.getElementById("soundToggle").addEventListener("change",  e=>{ settings.effectText=e.target.value; saveSettings(); });
document.getElementById("autoShowStats").addEventListener("change", e=>{ settings.resultHint=e.target.value; saveSettings(); });

/* ── 초기화 ── */
initBrainMap();
renderStats();
syncSettingsUI();
updateScoreDisplay();
</script>
