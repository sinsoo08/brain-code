<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 페이지</title>
    <link rel="icon" href="img/뇌.png" type="image/png">
    <style>
        header{
            position: fixed;
            top: 0;
            width: 100%;
        }
        
        body{
            margin: 0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;

            background-color: #2F6FD6;
            padding: 15px 30px;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
        }

        .menu a:hover {
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">브레인 코드</div>
    
        <ul class="menu">
            <li><a href="메인 페이지.html">홈</a></li>
            <li><a href="로그인 페이지.html">로그인</a></li>
        </ul>
    </nav>

    이메일 <input type="email" id="emailInput"><br>
    비밀번호 <input type="password" id="passwordInput"><br>
    <input type="submit" value="다음">
</body>
</html>
